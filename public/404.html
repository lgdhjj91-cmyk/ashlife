<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ashlife — Premium Lifestyle Store</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      var path = l.pathname;
      var isGithubIo = l.hostname.indexOf('github.io') !== -1;
      var segmentsToKeep = isGithubIo ? 1 : 0;

      var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;

      l.replace(redirectUrl);
    </script>
  </head>

  </body>
</html>
